<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>实时活动地球 - Real-time Activity Earth</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            overflow: hidden;
            background: #000;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        #canvas-container {
            width: 100vw;
            height: 100vh;
        }
        
        .ui-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10;
        }
        
        .header {
            position: absolute;
            top: 30px;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            color: #fff;
        }
        
        .header h1 {
            font-size: 2.5rem;
            font-weight: 300;
            letter-spacing: 8px;
            text-transform: uppercase;
            background: linear-gradient(90deg, #00d4ff, #7b2cbf);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 0 30px rgba(0, 212, 255, 0.5);
        }
        
        .header p {
            margin-top: 10px;
            font-size: 0.9rem;
            color: rgba(255, 255, 255, 0.6);
            letter-spacing: 2px;
        }
        
        .stats {
            position: absolute;
            bottom: 40px;
            left: 40px;
            display: flex;
            gap: 40px;
        }
        
        .stat-item {
            color: #fff;
        }
        
        .stat-value {
            font-size: 2rem;
            font-weight: 700;
            color: #00d4ff;
            text-shadow: 0 0 20px rgba(0, 212, 255, 0.8);
        }
        
        .stat-label {
            font-size: 0.75rem;
            color: rgba(255, 255, 255, 0.5);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-top: 5px;
        }
        
        .legend {
            position: absolute;
            bottom: 40px;
            right: 40px;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(10px);
            padding: 20px;
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .legend-item {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 10px;
            color: rgba(255, 255, 255, 0.8);
            font-size: 0.85rem;
        }
        
        .legend-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }
        
        .legend-dot.active { background: #00ff88; box-shadow: 0 0 10px #00ff88; }
        .legend-dot.data { background: #00d4ff; box-shadow: 0 0 10px #00d4ff; }
        .legend-dot.alert { background: #ff3366; box-shadow: 0 0 10px #ff3366; }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(1.2); }
        }
        
        .loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #00d4ff;
            font-size: 1.2rem;
            letter-spacing: 3px;
            animation: blink 1.5s infinite;
        }
        
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }
        
        .tooltip {
            position: absolute;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
            color: #fff;
            padding: 12px 16px;
            border-radius: 8px;
            border: 1px solid rgba(0, 212, 255, 0.3);
            font-size: 0.85rem;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.3s;
            z-index: 100;
            max-width: 250px;
        }
        
        .tooltip.show {
            opacity: 1;
        }
        
        .tooltip-title {
            color: #00d4ff;
            font-weight: 600;
            margin-bottom: 5px;
        }
        
        .tooltip-info {
            color: rgba(255, 255, 255, 0.7);
            font-size: 0.8rem;
        }
    </style>
</head>
<body>
    <div id="canvas-container"></div>
    <div class="loading" id="loading">正在加载地球...</div>
    
    <div class="ui-overlay">
        <div class="header">
            <h1>Earth Pulse</h1>
            <p>全球实时活动监测系统</p>
        </div>
        
        <div class="stats">
            <div class="stat-item">
                <div class="stat-value" id="active-users">0</div>
                <div class="stat-label">活跃用户</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="data-points">0</div>
                <div class="stat-label">数据节点</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="connections">0</div>
                <div class="stat-label">实时连接</div>
            </div>
        </div>
        
        <div class="legend">
            <div class="legend-item">
                <div class="legend-dot active"></div>
                <span>活跃用户</span>
            </div>
            <div class="legend-item">
                <div class="legend-dot data"></div>
                <span>数据传输</span>
            </div>
            <div class="legend-item">
                <div class="legend-dot alert"></div>
                <span>异常活动</span>
            </div>
        </div>
    </div>
    
    <div class="tooltip" id="tooltip">
        <div class="tooltip-title" id="tooltip-title"></div>
        <div class="tooltip-info" id="tooltip-info"></div>
    </div>

    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
    }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // 场景设置
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x000000);
        
        const camera = new THREE.PerspectiveCamera(
            45, 
            window.innerWidth / window.innerHeight, 
            0.1, 
            1000
        );
        camera.position.z = 3.5;
        
        const renderer = new THREE.WebGLRenderer({ 
            antialias: true, 
            alpha: true 
        });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.outputColorSpace = THREE.SRGBColorSpace;
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        // 控制器
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.enableZoom = true;
        controls.minDistance = 1.5;
        controls.maxDistance = 10;
        controls.autoRotate = true;
        controls.autoRotateSpeed = 0.5;

        // 创建地球纹理（使用 Canvas 生成）
        function createEarthTexture() {
            const canvas = document.createElement('canvas');
            canvas.width = 2048;
            canvas.height = 1024;
            const ctx = canvas.getContext('2d');
            
            // 海洋背景
            const oceanGradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
            oceanGradient.addColorStop(0, '#001a33');
            oceanGradient.addColorStop(0.5, '#003366');
            oceanGradient.addColorStop(1, '#001a33');
            ctx.fillStyle = oceanGradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // 添加网格线（经纬度）
            ctx.strokeStyle = 'rgba(0, 212, 255, 0.15)';
            ctx.lineWidth = 1;
            
            // 经线
            for (let i = 0; i <= 36; i++) {
                const x = (i / 36) * canvas.width;
                ctx.beginPath();
                ctx.moveTo(x, 0);
                ctx.lineTo(x, canvas.height);
                ctx.stroke();
            }
            
            // 纬线
            for (let i = 0; i <= 18; i++) {
                const y = (i / 18) * canvas.height;
                ctx.beginPath();
                ctx.moveTo(0, y);
                ctx.lineTo(canvas.width, y);
                ctx.stroke();
            }
            
            // 绘制简化的大陆轮廓（点阵风格）
            ctx.fillStyle = 'rgba(0, 150, 100, 0.6)';
            const continents = [
                {x: 0.15, y: 0.25, w: 0.2, h: 0.25},
                {x: 0.22, y: 0.55, w: 0.12, h: 0.25},
                {x: 0.48, y: 0.22, w: 0.12, h: 0.15},
                {x: 0.5, y: 0.38, w: 0.15, h: 0.25},
                {x: 0.6, y: 0.2, w: 0.25, h: 0.3},
                {x: 0.75, y: 0.65, w: 0.1, h: 0.12},
            ];
            
            continents.forEach(c => {
                const cx = c.x * canvas.width;
                const cy = c.y * canvas.height;
                const cw = c.w * canvas.width;
                const ch = c.h * canvas.height;
                
                for (let i = 0; i < 150; i++) {
                    const px = cx + Math.random() * cw;
                    const py = cy + Math.random() * ch;
                    const size = 2 + Math.random() * 4;
                    ctx.beginPath();
                    ctx.arc(px, py, size, 0, Math.PI * 2);
                    ctx.fill();
                }
            });
            
            return new THREE.CanvasTexture(canvas);
        }

        // 创建夜晚灯光纹理
        function createNightTexture() {
            const canvas = document.createElement('canvas');
            canvas.width = 2048;
            canvas.height = 1024;
            const ctx = canvas.getContext('2d');
            
            ctx.fillStyle = '#000000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            const cities = [
                {region: [0.1, 0.2, 0.3, 0.4], count: 80},
                {region: [0.2, 0.5, 0.35, 0.8], count: 60},
                {region: [0.45, 0.15, 0.6, 0.35], count: 70},
                {region: [0.48, 0.35, 0.65, 0.6], count: 50},
                {region: [0.6, 0.15, 0.9, 0.45], count: 150},
                {region: [0.72, 0.6, 0.88, 0.8], count: 40},
            ];
            
            cities.forEach(({region, count}) => {
                for (let i = 0; i < count; i++) {
                    const x = (region[0] + Math.random() * (region[2] - region[0])) * canvas.width;
                    const y = (region[1] + Math.random() * (region[3] - region[1])) * canvas.height;
                    const brightness = 0.3 + Math.random() * 0.7;
                    const size = 1 + Math.random() * 3;
                    
                    const gradient = ctx.createRadialGradient(x, y, 0, x, y, size * 3);
                    gradient.addColorStop(0, `rgba(255, 220, 100, ${brightness})`);
                    gradient.addColorStop(0.5, `rgba(255, 180, 50, ${brightness * 0.5})`);
                    gradient.addColorStop(1, 'rgba(255, 140, 0, 0)');
                    
                    ctx.fillStyle = gradient;
                    ctx.beginPath();
                    ctx.arc(x, y, size * 3, 0, Math.PI * 2);
                    ctx.fill();
                }
            });
            
            return new THREE.CanvasTexture(canvas);
        }

        const earthGroup = new THREE.Group();
        scene.add(earthGroup);

        const earthGeometry = new THREE.SphereGeometry(1, 128, 128);
        const earthMaterial = new THREE.MeshPhongMaterial({
            map: createEarthTexture(),
            emissiveMap: createNightTexture(),
            emissive: new THREE.Color(0xffaa44),
            emissiveIntensity: 0.8,
            specular: new THREE.Color(0x333333),
            shininess: 15
        });
        const earth = new THREE.Mesh(earthGeometry, earthMaterial);
        earthGroup.add(earth);

        // 大气层光晕
        const atmosphereGeometry = new THREE.SphereGeometry(1.08, 64, 64);
        const atmosphereMaterial = new THREE.ShaderMaterial({
            transparent: true,
            side: THREE.BackSide,
            uniforms: {
                c: { value: 0.6 },
                p: { value: 4.0 },
                glowColor: { value: new THREE.Color(0x00d4ff) },
                viewVector: { value: camera.position }
            },
            vertexShader: `
                uniform vec3 viewVector;
                varying float intensity;
                void main() {
                    vec3 vNormal = normalize(normalMatrix * normal);
                    vec3 vNormel = normalize(normalMatrix * viewVector);
                    intensity = pow(0.65 - dot(vNormal, vNormel), 4.0);
                    gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
                }
            `,
            fragmentShader: `
                uniform vec3 glowColor;
                varying float intensity;
                void main() {
                    vec3 glow = glowColor * intensity;
                    gl_FragColor = vec4(glow, intensity);
                }
            `,
            blending: THREE.AdditiveBlending
        });
        const atmosphere = new THREE.Mesh(atmosphereGeometry, atmosphereMaterial);
        scene.add(atmosphere);

        // 内部发光层
        const innerGlowGeometry = new THREE.SphereGeometry(1.03, 64, 64);
        const innerGlowMaterial = new THREE.MeshBasicMaterial({
            color: 0x00d4ff,
            transparent: true,
            opacity: 0.1,
            side: THREE.BackSide
        });
        const innerGlow = new THREE.Mesh(innerGlowGeometry, innerGlowMaterial);
        earthGroup.add(innerGlow);

        // 星空背景
        function createStarfield() {
            const geometry = new THREE.BufferGeometry();
            const count = 3000;
            const positions = new Float32Array(count * 3);
            const colors = new Float32Array(count * 3);
            const sizes = new Float32Array(count);
            
            for (let i = 0; i < count; i++) {
                const i3 = i * 3;
                const radius = 15 + Math.random() * 35;
                const theta = Math.random() * Math.PI * 2;
                const phi = Math.acos(2 * Math.random() - 1);
                
                positions[i3] = radius * Math.sin(phi) * Math.cos(theta);
                positions[i3 + 1] = radius * Math.sin(phi) * Math.sin(theta);
                positions[i3 + 2] = radius * Math.cos(phi);
                
                const colorType = Math.random();
                if (colorType > 0.9) {
                    colors[i3] = 0.8; colors[i3 + 1] = 0.8; colors[i3 + 2] = 1;
                } else if (colorType > 0.7) {
                    colors[i3] = 1; colors[i3 + 1] = 0.9; colors[i3 + 2] = 0.7;
                } else {
                    colors[i3] = 1; colors[i3 + 1] = 1; colors[i3 + 2] = 1;
                }
                
                sizes[i] = Math.random() * 2;
            }
            
            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));
            geometry.setAttribute('size', new THREE.BufferAttribute(sizes, 1));
            
            const material = new THREE.PointsMaterial({
                size: 0.05,
                vertexColors: true,
                transparent: true,
                opacity: 0.8,
                sizeAttenuation: true
            });
            
            return new THREE.Points(geometry, material);
        }
        
        const stars = createStarfield();
        scene.add(stars);

        const activityPoints = [];
        const connections = [];
        const markers = [];

        function latLonToVector3(lat, lon, radius) {
            const phi = (90 - lat) * (Math.PI / 180);
            const theta = (lon + 180) * (Math.PI / 180);
            
            const x = -(radius * Math.sin(phi) * Math.cos(theta));
            const z = radius * Math.sin(phi) * Math.sin(theta);
            const y = radius * Math.cos(phi);
            
            return new THREE.Vector3(x, y, z);
        }

        function createActivityMarker(lat, lon, type = 'active') {
            const position = latLonToVector3(lat, lon, 1.02);
            
            const colors = {
                active: 0x00ff88,
                data: 0x00d4ff,
                alert: 0xff3366
            };
            
            const markerGroup = new THREE.Group();
            markerGroup.position.copy(position);
            markerGroup.lookAt(new THREE.Vector3(0, 0, 0));
            
            const coreGeometry = new THREE.SphereGeometry(0.015, 16, 16);
            const coreMaterial = new THREE.MeshBasicMaterial({
                color: colors[type]
            });
            const core = new THREE.Mesh(coreGeometry, coreMaterial);
            markerGroup.add(core);
            
            const ringGeometry = new THREE.RingGeometry(0.02, 0.025, 32);
            const ringMaterial = new THREE.MeshBasicMaterial({
                color: colors[type],
                transparent: true,
                opacity: 0.6,
                side: THREE.DoubleSide
            });
            const ring = new THREE.Mesh(ringGeometry, ringMaterial);
            ring.lookAt(new THREE.Vector3(0, 0, 0));
            markerGroup.add(ring);
            
            const beamGeometry = new THREE.CylinderGeometry(0.005, 0.005, 0.15, 8);
            const beamMaterial = new THREE.MeshBasicMaterial({
                color: colors[type],
                transparent: true,
                opacity: 0.4
            });
            const beam = new THREE.Mesh(beamGeometry, beamMaterial);
            beam.position.z = 0.075;
            beam.rotation.x = Math.PI / 2;
            markerGroup.add(beam);
            
            markerGroup.userData = {
                type: type,
                ring: ring,
                beam: beam,
                core: core,
                baseScale: 1,
                lat: lat,
                lon: lon,
                createdAt: Date.now()
            };
            
            earthGroup.add(markerGroup);
            markers.push(markerGroup);
            
            return markerGroup;
        }

        function createConnection(startLat, startLon, endLat, endLon) {
            const start = latLonToVector3(startLat, startLon, 1.02);
            const end = latLonToVector3(endLat, endLon, 1.02);
            
            const mid = new THREE.Vector3().addVectors(start, end).multiplyScalar(0.5);
            const distance = start.distanceTo(end);
            const height = 1 + distance * 0.3;
            mid.normalize().multiplyScalar(height);
            
            const curve = new THREE.QuadraticBezierCurve3(start, mid, end);
            const points = curve.getPoints(50);
            const geometry = new THREE.BufferGeometry().setFromPoints(points);
            
            const material = new THREE.LineBasicMaterial({
                color: 0x00d4ff,
                transparent: true,
                opacity: 0.6
            });
            
            const line = new THREE.Line(geometry, material);
            earthGroup.add(line);
            
            const particleGeometry = new THREE.SphereGeometry(0.008, 8, 8);
            const particleMaterial = new THREE.MeshBasicMaterial({
                color: 0x00ffff,
                transparent: true,
                opacity: 1
            });
            const particle = new THREE.Mesh(particleGeometry, particleMaterial);
            earthGroup.add(particle);
            
            const connection = {
                line: line,
                particle: particle,
                curve: curve,
                progress: 0,
                speed: 0.01 + Math.random() * 0.02
            };
            
            connections.push(connection);
            return connection;
        }

        const majorCities = [
            {lat: 40.7128, lon: -74.0060, name: 'New York', region: 'NA'},
            {lat: 34.0522, lon: -118.2437, name: 'Los Angeles', region: 'NA'},
            {lat: 51.5074, lon: -0.1278, name: 'London', region: 'EU'},
            {lat: 48.8566, lon: 2.3522, name: 'Paris', region: 'EU'},
            {lat: 52.5200, lon: 13.4050, name: 'Berlin', region: 'EU'},
            {lat: 55.7558, lon: 37.6173, name: 'Moscow', region: 'EU'},
            {lat: 35.6762, lon: 139.6503, name: 'Tokyo', region: 'AS'},
            {lat: 39.9042, lon: 116.4074, name: 'Beijing', region: 'AS'},
            {lat: 31.2304, lon: 121.4737, name: 'Shanghai', region: 'AS'},
            {lat: 1.3521, lon: 103.8198, name: 'Singapore', region: 'AS'},
            {lat: 19.0760, lon: 72.8777, name: 'Mumbai', region: 'AS'},
            {lat: 37.5665, lon: 126.9780, name: 'Seoul', region: 'AS'},
            {lat: -33.8688, lon: 151.2093, name: 'Sydney', region: 'AU'},
            {lat: -23.5505, lon: -46.6333, name: 'São Paulo', region: 'SA'},
            {lat: 19.4326, lon: -99.1332, name: 'Mexico City', region: 'NA'},
            {lat: -1.2921, lon: 36.8219, name: 'Nairobi', region: 'AF'},
            {lat: -26.2041, lon: 28.0473, name: 'Johannesburg', region: 'AF'},
            {lat: 25.2048, lon: 55.2708, name: 'Dubai', region: 'AS'},
            {lat: 28.6139, lon: 77.2090, name: 'New Delhi', region: 'AS'},
            {lat: 41.0082, lon: 28.9784, name: 'Istanbul', region: 'EU'}
        ];

        majorCities.forEach(city => {
            const types = ['active', 'active', 'data', 'data', 'alert'];
            const type = types[Math.floor(Math.random() * types.length)];
            createActivityMarker(city.lat, city.lon, type);
        });

        for (let i = 0; i < 15; i++) {
            const start = majorCities[Math.floor(Math.random() * majorCities.length)];
            const end = majorCities[Math.floor(Math.random() * majorCities.length)];
            if (start !== end) {
                createConnection(start.lat, start.lon, end.lat, end.lon);
            }
        }

        function addRandomActivity() {
            const lat = (Math.random() - 0.5) * 160;
            const lon = (Math.random() - 0.5) * 360;
            const types = ['active', 'data', 'data', 'alert'];
            const type = types[Math.floor(Math.random() * types.length)];
            createActivityMarker(lat, lon, type);
            
            if (markers.length > 50) {
                const old = markers.shift();
                earthGroup.remove(old);
            }
        }

        function addRandomConnection() {
            if (markers.length >= 2) {
                const start = markers[Math.floor(Math.random() * markers.length)];
                const end = markers[Math.floor(Math.random() * markers.length)];
                if (start !== end) {
                    createConnection(start.userData.lat, start.userData.lon, 
                                   end.userData.lat, end.userData.lon);
                }
            }
            
            if (connections.length > 20) {
                const old = connections.shift();
                earthGroup.remove(old.line);
                earthGroup.remove(old.particle);
            }
        }

        const ambientLight = new THREE.AmbientLight(0x333333, 2);
        scene.add(ambientLight);

        const sunLight = new THREE.DirectionalLight(0xffffff, 2);
        sunLight.position.set(5, 3, 5);
        scene.add(sunLight);

        const rimLight = new THREE.DirectionalLight(0x00d4ff, 0.5);
        rimLight.position.set(-5, 0, -5);
        scene.add(rimLight);

        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();
        let hoveredMarker = null;

        function onMouseMove(event) {
            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
            
            const tooltip = document.getElementById('tooltip');
            tooltip.style.left = event.clientX + 15 + 'px';
            tooltip.style.top = event.clientY + 15 + 'px';
        }

        window.addEventListener('mousemove', onMouseMove);

        function checkHover() {
            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(markers, true);
            
            const tooltip = document.getElementById('tooltip');
            const titleEl = document.getElementById('tooltip-title');
            const infoEl = document.getElementById('tooltip-info');
            
            if (intersects.length > 0) {
                const marker = intersects[0].object.parent;
                if (marker !== hoveredMarker) {
                    hoveredMarker = marker;
                    
                    const typeNames = {
                        active: '活跃用户',
                        data: '数据传输',
                        alert: '异常活动'
                    };
                    
                    titleEl.textContent = `${typeNames[marker.userData.type]} - ${marker.userData.lat.toFixed(2)}, ${marker.userData.lon.toFixed(2)}`;
                    infoEl.textContent = `实时监测中 | 信号强度: ${(Math.random() * 100).toFixed(0)}%`;
                    tooltip.classList.add('show');
                    
                    document.body.style.cursor = 'pointer';
                }
            } else {
                if (hoveredMarker) {
                    hoveredMarker = null;
                    tooltip.classList.remove('show');
                    document.body.style.cursor = 'default';
                }
            }
        }

        let stats = {
            users: 125847,
            nodes: markers.length,
            connections: connections.length
        };

        function updateStats() {
            stats.users += Math.floor(Math.random() * 50) - 20;
            stats.nodes = markers.length;
            stats.connections = connections.length;
            
            document.getElementById('active-users').textContent = stats.users.toLocaleString();
            document.getElementById('data-points').textContent = stats.nodes;
            document.getElementById('connections').textContent = stats.connections;
        }

        setInterval(updateStats, 1000);
        setInterval(addRandomActivity, 2000);
        setInterval(addRandomConnection, 3000);

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        document.getElementById('loading').style.display = 'none';

        function animate() {
            requestAnimationFrame(animate);
            
            const time = Date.now() * 0.001;
            
            controls.update();
            
            atmosphereMaterial.uniforms.viewVector.value = camera.position;
            
            stars.rotation.y += 0.0002;
            
            markers.forEach((marker, i) => {
                const data = marker.userData;
                const age = (Date.now() - data.createdAt) / 1000;
                
                const pulseScale = 1 + Math.sin(time * 3 + i) * 0.3;
                data.ring.scale.set(pulseScale, pulseScale, pulseScale);
                data.ring.material.opacity = 0.6 - (pulseScale - 1) * 0.3;
                
                data.beam.material.opacity = 0.3 + Math.sin(time * 5 + i * 0.5) * 0.2;
                
                data.core.material.opacity = 0.8 + Math.sin(time * 4 + i) * 0.2;
            });
            
            connections.forEach(conn => {
                conn.progress += conn.speed;
                if (conn.progress > 1) conn.progress = 0;
                
                const point = conn.curve.getPoint(conn.progress);
                conn.particle.position.copy(point);
                
                conn.particle.material.opacity = Math.sin(conn.progress * Math.PI);
            });
            
            checkHover();
            
            renderer.render(scene, camera);
        }

        animate();
    </script>
</body>
</html>
