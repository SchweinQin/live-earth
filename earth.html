<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>地球监测系统 | Earth Monitor</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            overflow: hidden;
            background: #000;
            font-family: 'SF Mono', 'Fira Code', monospace;
        }
        
        #canvas-container {
            width: 100vw;
            height: 100vh;
        }
        
        .ui-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10;
        }
        
        .top-bar {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            padding: 24px 32px;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            background: linear-gradient(180deg, rgba(0,0,0,0.6) 0%, transparent 100%);
        }
        
        .brand {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        
        .brand h1 {
            font-size: 1.4rem;
            font-weight: 600;
            color: #e0e0e0;
            letter-spacing: 3px;
        }
        
        .brand span {
            font-size: 0.65rem;
            color: #ff6b35;
            letter-spacing: 2px;
            text-transform: uppercase;
        }
        
        .clock {
            text-align: right;
            color: #888;
            font-size: 0.75rem;
        }
        
        .clock .time {
            font-size: 1.1rem;
            color: #e0e0e0;
            font-weight: 300;
            letter-spacing: 1px;
        }
        
        .left-panel {
            position: absolute;
            left: 32px;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        
        .stat-box {
            background: rgba(10, 10, 15, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 107, 53, 0.2);
            border-radius: 8px;
            padding: 16px 20px;
            min-width: 140px;
            transition: all 0.3s ease;
        }
        
        .stat-box:hover {
            border-color: rgba(255, 107, 53, 0.5);
            transform: translateX(4px);
        }
        
        .stat-box .label {
            font-size: 0.6rem;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 6px;
        }
        
        .stat-box .value {
            font-size: 1.6rem;
            font-weight: 700;
            color: #ff6b35;
            text-shadow: 0 0 20px rgba(255, 107, 53, 0.4);
        }
        
        .stat-box .unit {
            font-size: 0.7rem;
            color: #888;
            margin-left: 4px;
        }
        
        .right-panel {
            position: absolute;
            right: 32px;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        
        .legend-item {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.7rem;
            color: #888;
        }
        
        .legend-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            position: relative;
        }
        
        .legend-dot::after {
            content: '';
            position: absolute;
            inset: -3px;
            border-radius: 50%;
            animation: ping 2s infinite;
        }
        
        .legend-dot.orange::after { background: rgba(255, 107, 53, 0.4); }
        .legend-dot.cyan::after { background: rgba(0, 212, 255, 0.4); }
        .legend-dot.purple::after { background: rgba(180, 120, 255, 0.4); }
        
        @keyframes ping {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(2); opacity: 0; }
        }
        
        .bottom-bar {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 20px 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: linear-gradient(0deg, rgba(0,0,0,0.6) 0%, transparent 100%);
        }
        
        .scan-line {
            font-size: 0.65rem;
            color: #444;
            letter-spacing: 1px;
        }
        
        .scan-line span {
            color: #ff6b35;
        }
        
        .controls {
            display: flex;
            gap: 8px;
            pointer-events: auto;
        }
        
        .ctrl-btn {
            background: rgba(255, 107, 53, 0.1);
            border: 1px solid rgba(255, 107, 53, 0.3);
            color: #aaa;
            padding: 8px 14px;
            font-size: 0.65rem;
            cursor: pointer;
            transition: all 0.2s;
            letter-spacing: 1px;
            border-radius: 4px;
        }
        
        .ctrl-btn:hover {
            background: rgba(255, 107, 53, 0.2);
            border-color: #ff6b35;
            color: #fff;
        }
        
        .loading {
            position: fixed;
            inset: 0;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            transition: opacity 0.5s;
        }
        
        .loading.hidden {
            opacity: 0;
            pointer-events: none;
        }
        
        .loader {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
        }
        
        .loader-ring {
            width: 40px;
            height: 40px;
            border: 2px solid rgba(255, 107, 53, 0.2);
            border-top-color: #ff6b35;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .loader span {
            font-size: 0.7rem;
            color: #666;
            letter-spacing: 2px;
        }
        
        .tooltip {
            position: fixed;
            background: rgba(10, 10, 15, 0.95);
            border: 1px solid rgba(255, 107, 53, 0.3);
            padding: 12px 16px;
            border-radius: 6px;
            font-size: 0.75rem;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.2s;
            z-index: 100;
        }
        
        .tooltip.show { opacity: 1; }
        
        .tooltip .city {
            color: #ff6b35;
            font-weight: 600;
            margin-bottom: 4px;
        }
        
        .tooltip .info {
            color: #888;
            font-size: 0.65rem;
        }
    </style>
</head>
<body>
    <div id="canvas-container"></div>
    
    <div class="loading" id="loading">
        <div class="loader">
            <div class="loader-ring"></div>
            <span>INITIALIZING</span>
        </div>
    </div>
    
    <div class="ui-layer">
        <div class="top-bar">
            <div class="brand">
                <h1>EARTH PULSE</h1>
                <span>Global Monitoring System</span>
            </div>
            <div class="clock">
                <div class="time" id="clock">00:00:00</div>
                <div id="date">2026.02.22</div>
            </div>
        </div>
        
        <div class="left-panel">
            <div class="stat-box">
                <div class="label">Active Nodes</div>
                <div class="value" id="nodes">0</div>
            </div>
            <div class="stat-box">
                <div class="label">Data Flow</div>
                <div class="value" id="flow">0<span class="unit">KB/s</span></div>
            </div>
            <div class="stat-box">
                <div class="label">Signals</div>
                <div class="value" id="signals">0</div>
            </div>
        </div>
        
        <div class="right-panel">
            <div class="legend-item">
                <div class="legend-dot orange"></div>
                <span>Active</span>
            </div>
            <div class="legend-item">
                <div class="legend-dot cyan"></div>
                <span>Data</span>
            </div>
            <div class="legend-item">
                <div class="legend-dot purple"></div>
                <span>Alert</span>
            </div>
        </div>
        
        <div class="bottom-bar">
            <div class="scan-line">
                SCANNING: <span id="scan-target">PACIFIC OCEAN</span>
            </div>
            <div class="controls">
                <button class="ctrl-btn" onclick="toggleRotation()">ROTATE</button>
                <button class="ctrl-btn" onclick="toggleAtmo()">ATMOSPHERE</button>
                <button class="ctrl-btn" onclick="resetView()">RESET</button>
            </div>
        </div>
    </div>
    
    <div class="tooltip" id="tooltip">
        <div class="city" id="tip-city">-</div>
        <div class="info" id="tip-info">-</div>
    </div>

    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
    }
    </script>
    
    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        
        // 配置
        const CONFIG = {
            earthRadius: 2,
            atmosphereRadius: 2.15,
            starCount: 2500,
            autoRotateSpeed: 0.3
        };
        
        // 状态
        let scene, camera, renderer, controls;
        let earth, atmosphere, stars;
        let markers = [], connections = [];
        let autoRotate = true, showAtmo = true;
        let stats = { nodes: 0, flow: 0, signals: 0 };
        
        // 初始化
        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x000000);
            
            camera = new THREE.PerspectiveCamera(40, window.innerWidth / window.innerHeight, 0.1, 100);
            camera.position.z = 7;
            
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.toneMapping = THREE.ACESFilmicToneMapping;
            document.getElementById('canvas-container').appendChild(renderer.domElement);
            
            controls = new OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;
            controls.minDistance = 4;
            controls.maxDistance = 15;
            controls.autoRotate = true;
            controls.autoRotateSpeed = CONFIG.autoRotateSpeed;
            
            createEarth();
            createAtmosphere();
            createStars();
            createInitialData();
            setupLights();
            setupEvents();
            
            setTimeout(() => {
                document.getElementById('loading').classList.add('hidden');
            }, 1500);
            
            updateClock();
            setInterval(updateClock, 1000);
            setInterval(updateStats, 800);
            
            animate();
        }
        
        // 创建地球
        function createEarth() {
            const geometry = new THREE.SphereGeometry(CONFIG.earthRadius, 96, 96);
            
            const material = new THREE.MeshPhongMaterial({
                map: createDayTexture(),
                bumpMap: createBumpTexture(),
                bumpScale: 0.02,
                specular: new THREE.Color(0x222222),
                shininess: 8
            });
            
            earth = new THREE.Mesh(geometry, material);
            scene.add(earth);
        }
        
        // 白天纹理
        function createDayTexture() {
            const canvas = document.createElement('canvas');
            canvas.width = 2048;
            canvas.height = 1024;
            const ctx = canvas.getContext('2d');
            
            // 深海渐变
            const grad = ctx.createLinearGradient(0, 0, 0, canvas.height);
            grad.addColorStop(0, '#0a1628');
            grad.addColorStop(0.5, '#0d2847');
            grad.addColorStop(1, '#0a1628');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // 经纬网格
            ctx.strokeStyle = 'rgba(255, 107, 53, 0.08)';
            ctx.lineWidth = 1;
            
            for (let i = 0; i <= 24; i++) {
                ctx.beginPath();
                ctx.moveTo((i/24) * canvas.width, 0);
                ctx.lineTo((i/24) * canvas.width, canvas.height);
                ctx.stroke();
            }
            
            for (let i = 0; i <= 12; i++) {
                ctx.beginPath();
                ctx.moveTo(0, (i/12) * canvas.height);
                ctx.lineTo(canvas.width, (i/12) * canvas.height);
                ctx.stroke();
            }
            
            // 简约大陆
            ctx.fillStyle = 'rgba(45, 80, 60, 0.5)';
            drawSimpleContinent(ctx, 0.12, 0.18, 0.22, 0.22);
            drawSimpleContinent(ctx, 0.20, 0.52, 0.10, 0.20);
            drawSimpleContinent(ctx, 0.46, 0.20, 0.14, 0.14);
            drawSimpleContinent(ctx, 0.48, 0.38, 0.16, 0.24);
            drawSimpleContinent(ctx, 0.62, 0.18, 0.24, 0.28);
            drawSimpleContinent(ctx, 0.74, 0.58, 0.10, 0.12);
            
            return new THREE.CanvasTexture(canvas);
        }
        
        function drawSimpleContinent(ctx, x, y, w, h) {
            const cx = x * ctx.canvas.width;
            const cy = y * ctx.canvas.height;
            const cw = w * ctx.canvas.width;
            const ch = h * ctx.canvas.height;
            
            ctx.beginPath();
            for (let i = 0; i < 8; i++) {
                const angle = (i / 8) * Math.PI * 2;
                const rx = cw/2 * (0.7 + Math.random() * 0.3);
                const ry = ch/2 * (0.7 + Math.random() * 0.3);
                const px = cx + cw/2 + Math.cos(angle) * rx;
                const py = cy + ch/2 + Math.sin(angle) * ry;
                i === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
            }
            ctx.closePath();
            ctx.fill();
        }
        
        // 凹凸贴图
        function createBumpTexture() {
            const canvas = document.createElement('canvas');
            canvas.width = 512;
            canvas.height = 256;
            const ctx = canvas.getContext('2d');
            
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            for (let i = 0; i < 80; i++) {
                const x = Math.random() * canvas.width;
                const y = Math.random() * canvas.height;
                const r = 5 + Math.random() * 20;
                const g = ctx.createRadialGradient(x, y, 0, x, y, r);
                g.addColorStop(0, 'rgba(255,255,255,0.15)');
                g.addColorStop(1, 'rgba(0,0,0,0)');
                ctx.fillStyle = g;
                ctx.fillRect(x-r, y-r, r*2, r*2);
            }
            
            return new THREE.CanvasTexture(canvas);
        }
        
        // 大气层
        function createAtmosphere() {
            const geometry = new THREE.SphereGeometry(CONFIG.atmosphereRadius, 64, 64);
            const material = new THREE.ShaderMaterial({
                transparent: true,
                side: THREE.BackSide,
                uniforms: {
                    glowColor: { value: new THREE.Color(0xff6b35) },
                    viewVector: { value: camera.position }
                },
                vertexShader: `
                    uniform vec3 viewVector;
                    varying float intensity;
                    void main() {
                        vec3 vNormal = normalize(normalMatrix * normal);
                        vec3 vNormel = normalize(normalMatrix * viewVector);
                        intensity = pow(0.6 - dot(vNormal, vNormel), 3.5);
                        gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
                    }
                `,
                fragmentShader: `
                    uniform vec3 glowColor;
                    varying float intensity;
                    void main() {
                        gl_FragColor = vec4(glowColor, intensity * 0.7);
                    }
                `,
                blending: THREE.AdditiveBlending
            });
            
            atmosphere = new THREE.Mesh(geometry, material);
            scene.add(atmosphere);
        }
        
        // 星空
        function createStars() {
            const geometry = new THREE.BufferGeometry();
            const positions = new Float32Array(CONFIG.starCount * 3);
            const colors = new Float32Array(CONFIG.starCount * 3);
            
            for (let i = 0; i < CONFIG.starCount; i++) {
                const i3 = i * 3;
                const radius = 20 + Math.random() * 30;
                const theta = Math.random() * Math.PI * 2;
                const phi = Math.acos(2 * Math.random() - 1);
                
                positions[i3] = radius * Math.sin(phi) * Math.cos(theta);
                positions[i3 + 1] = radius * Math.sin(phi) * Math.sin(theta);
                positions[i3 + 2] = radius * Math.cos(phi);
                
                const t = Math.random();
                if (t > 0.9) {
                    colors[i3] = 1; colors[i3+1] = 0.5; colors[i3+2] = 0.3;
                } else if (t > 0.7) {
                    colors[i3] = 0.5; colors[i3+1] = 0.7; colors[i3+2] = 1;
                } else {
                    colors[i3] = 1; colors[i3+1] = 1; colors[i3+2] = 1;
                }
            }
            
            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));
            
            const material = new THREE.PointsMaterial({
                size: 0.08,
                vertexColors: true,
                transparent: true,
                opacity: 0.7,
                sizeAttenuation: true
            });
            
            stars = new THREE.Points(geometry, material);
            scene.add(stars);
        }
        
        // 城市数据
        const cities = [
            {lat: 40.7, lon: -74, name: 'New York'},
            {lat: 34.1, lon: -118, name: 'Los Angeles'},
            {lat: 51.5, lon: 0, name: 'London'},
            {lat: 48.9, lon: 2.4, name: 'Paris'},
            {lat: 52.5, lon: 13.4, name: 'Berlin'},
            {lat: 55.8, lon: 37.6, name: 'Moscow'},
            {lat: 35.7, lon: 139.7, name: 'Tokyo'},
            {lat: 39.9, lon: 116.4, name: 'Beijing'},
            {lat: 31.2, lon: 121.5, name: 'Shanghai'},
            {lat: 1.4, lon: 103.8, name: 'Singapore'},
            {lat: 19.1, lon: 72.9, name: 'Mumbai'},
            {lat: 37.6, lon: 127, name: 'Seoul'},
            {lat: -33.9, lon: 151.2, name: 'Sydney'},
            {lat: -23.6, lon: -46.6, name: 'São Paulo'},
            {lat: 19.4, lon: -99.1, name: 'Mexico City'},
            {lat: -1.3, lon: 36.8, name: 'Nairobi'},
            {lat: 25.2, lon: 55.3, name: 'Dubai'},
            {lat: 41, lon: 29, name: 'Istanbul'}
        ];
        
        const scanTargets = [
            'PACIFIC OCEAN', 'ATLANTIC OCEAN', 'INDIAN OCEAN',
            'NORTH AMERICA', 'SOUTH AMERICA', 'EUROPE', 'ASIA', 'AFRICA', 'AUSTRALIA'
        ];
        
        // 初始化数据点
        function createInitialData() {
            cities.forEach(city => {
                createMarker(city.lat, city.lon, city.name);
            });
            
            for (let i = 0; i < 8; i++) {
                const a = cities[Math.floor(Math.random() * cities.length)];
                const b = cities[Math.floor(Math.random() * cities.length)];
                if (a !== b) createConnection(a, b);
            }
        }
        
        // 创建标记
        function createMarker(lat, lon, name) {
            const pos = latLonToVector3(lat, lon, CONFIG.earthRadius + 0.02);
            const group = new THREE.Group();
            group.position.copy(pos);
            group.lookAt(new THREE.Vector3(0, 0, 0));
            
            const colors = [0xff6b35, 0x00d4ff, 0xb478ff];
            const color = colors[Math.floor(Math.random() * colors.length)];
            
            const core = new THREE.Mesh(
                new THREE.SphereGeometry(0.025, 12, 12),
                new THREE.MeshBasicMaterial({ color })
            );
            group.add(core);
            
            const ring = new THREE.Mesh(
                new THREE.RingGeometry(0.035, 0.045, 24),
                new THREE.MeshBasicMaterial({ color, transparent: true, opacity: 0.5, side: THREE.DoubleSide })
            );
            ring.lookAt(new THREE.Vector3(0, 0, 0));
            group.add(ring);
            
            group.userData = { name, lat, lon, color, ring, phase: Math.random() * Math.PI * 2 };
            scene.add(group);
            markers.push(group);
            stats.nodes = markers.length;
        }
        
        // 创建连接
        function createConnection(start, end) {
            const p1 = latLonToVector3(start.lat, start.lon, CONFIG.earthRadius + 0.02);
            const p2 = latLonToVector3(end.lat, end.lon, CONFIG.earthRadius + 0.02);
            
            const mid = p1.clone().add(p2).multiplyScalar(0.5).normalize().multiplyScalar(CONFIG.earthRadius + 0.3);
            const curve = new THREE.QuadraticBezierCurve3(p1, mid, p2);
            const points = curve.getPoints(40);
            
            const line = new THREE.Line(
                new THREE.BufferGeometry().setFromPoints(points),
                new THREE.LineBasicMaterial({ color: 0x00d4ff, transparent: true, opacity: 0.4 })
            );
            scene.add(line);
            
            const particle = new THREE.Mesh(
                new THREE.SphereGeometry(0.015, 8, 8),
                new THREE.MeshBasicMaterial({ color: 0x00d4ff })
            );
            scene.add(particle);
            
            connections.push({ line, particle, curve, progress: 0, speed: 0.008 + Math.random() * 0.01 });
            stats.signals = connections.length;
        }
        
        function latLonToVector3(lat, lon, r) {
            const phi = (90 - lat) * (Math.PI / 180);
            const theta = (lon + 180) * (Math.PI / 180);
            return new THREE.Vector3(
                -r * Math.sin(phi) * Math.cos(theta),
                r * Math.cos(phi),
                r * Math.sin(phi) * Math.sin(theta)
            );
        }
        
        // 光照
        function setupLights() {
            scene.add(new THREE.AmbientLight(0x222222, 1.5));
            scene.add(new THREE.DirectionalLight(0xffffff, 1.2)).position.set(5, 3, 5);
            scene.add(new THREE.DirectionalLight(0xff6b35, 0.3)).position.set(-5, -2, -5);
        }
        
        // 事件
        function setupEvents() {
            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });
            
            let hoverMarker = null;
            const raycaster = new THREE.Raycaster();
            const mouse = new THREE.Vector2();
            const tooltip = document.getElementById('tooltip');
            
            window.addEventListener('mousemove', (e) => {
                mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
                mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
                tooltip.style.left = e.clientX + 15 + 'px';
                tooltip.style.top = e.clientY + 15 + 'px';
            });
            
            window.addEventListener('mousemove', () => {
                raycaster.setFromCamera(mouse, camera);
                const hits = raycaster.intersectObjects(markers, true);
                
                if (hits.length > 0) {
                    const m = hits[0].object.parent;
                    if (m.userData.name) {
                        if (hoverMarker !== m) {
                            hoverMarker = m;
                            document.getElementById('tip-city').textContent = m.userData.name;
                            document.getElementById('tip-info').textContent = 
                                `LAT: ${m.userData.lat.toFixed(2)}° | LON: ${m.userData.lon.toFixed(2)}°`;
                            tooltip.classList.add('show');
                        }
                    }
                } else {
                    hoverMarker = null;
                    tooltip.classList.remove('show');
                }
            });
            
            // 随机事件
            setInterval(() => {
                if (markers.length < 25 && Math.random() > 0.6) {
                    const c = cities[Math.floor(Math.random() * cities.length)];
                    createMarker(c.lat, c.lon, c.name);
                }
            }, 3000);
            
            setInterval(() => {
                if (connections.length < 15 && markers.length >= 2) {
                    const a = markers[Math.floor(Math.random() * markers.length)];
                    const b = markers[Math.floor(Math.random() * markers.length)];
                    if (a !== b && a.userData.name && b.userData.name) {
                        createConnection(
                            {lat: a.userData.lat, lon: a.userData.lon},
                            {lat: b.userData.lat, lon: b.userData.lon}
                        );
                    }
                }
            }, 2500);
            
            setInterval(() => {
                document.getElementById('scan-target').textContent = 
                    scanTargets[Math.floor(Math.random() * scanTargets.length)];
            }, 5000);
        }
        
        function updateClock() {
            const now = new Date();
            document.getElementById('clock').textContent = 
                now.toTimeString().split(' ')[0];
            document.getElementById('date').textContent = 
                now.toISOString().split('T')[0].replace(/-/g, '.');
        }
        
        function updateStats() {
            document.getElementById('nodes').textContent = markers.length;
            document.getElementById('flow').textContent = (Math.random() * 500 + 100).toFixed(0);
            document.getElementById('signals').textContent = connections.length;
        }
        
        // 全局函数
        window.toggleRotation = () => {
            autoRotate = !autoRotate;
            controls.autoRotate = autoRotate;
        };
        
        window.toggleAtmo = () => {
            showAtmo = !showAtmo;
            atmosphere.visible = showAtmo;
        };
        
        window.resetView = () => {
            camera.position.set(0, 0, 7);
            controls.reset();
        };
        
        // 动画
        function animate() {
            requestAnimationFrame(animate);
            
            const time = Date.now() * 0.001;
            
            controls.update();
            atmosphere.material.uniforms.viewVector.value = camera.position;
            stars.rotation.y += 0.0001;
            
            markers.forEach((m, i) => {
                const scale = 1 + Math.sin(time * 2 + m.userData.phase) * 0.2;
                m.userData.ring.scale.setScalar(scale);
                m.userData.ring.material.opacity = 0.5 - (scale - 1) * 0.2;
            });
            
            connections.forEach(c => {
                c.progress += c.speed;
                if (c.progress > 1) c.progress = 0;
                c.particle.position.copy(c.curve.getPoint(c.progress));
            });
            
            renderer.render(scene, camera);
        }
        
        init();
    </script>
</body>
</html>
