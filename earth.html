<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>实时活动地球 | Live Earth</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            overflow: hidden;
            background: #000;
            font-family: 'Segoe UI', system-ui, sans-serif;
        }
        
        #canvas-container {
            width: 100vw;
            height: 100vh;
            position: fixed;
            top: 0;
            left: 0;
        }
        
        .info-panel {
            position: fixed;
            top: 20px;
            left: 20px;
            color: #fff;
            z-index: 100;
            pointer-events: none;
        }
        
        .info-panel h1 {
            font-size: 1.5rem;
            font-weight: 300;
            letter-spacing: 4px;
            text-transform: uppercase;
            margin-bottom: 8px;
            background: linear-gradient(90deg, #4fc3f7, #81d4fa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .info-panel p {
            font-size: 0.75rem;
            color: rgba(255,255,255,0.5);
            letter-spacing: 2px;
        }
        
        .stats {
            position: fixed;
            bottom: 20px;
            left: 20px;
            color: rgba(255,255,255,0.6);
            font-size: 0.7rem;
            font-family: 'Courier New', monospace;
            z-index: 100;
        }
        
        .loading {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #4fc3f7;
            font-size: 1rem;
            letter-spacing: 4px;
            z-index: 1000;
            animation: pulse 1.5s ease-in-out infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 0.4; }
            50% { opacity: 1; }
        }
        
        .controls {
            position: fixed;
            bottom: 20px;
            right: 20px;
            display: flex;
            gap: 10px;
            z-index: 100;
        }
        
        .control-btn {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            color: rgba(255,255,255,0.7);
            padding: 8px 16px;
            font-size: 0.7rem;
            cursor: pointer;
            transition: all 0.3s ease;
            letter-spacing: 1px;
        }
        
        .control-btn:hover {
            background: rgba(79, 195, 247, 0.3);
            border-color: #4fc3f7;
            color: #fff;
        }
    </style>
</head>
<body>
    <div id="canvas-container"></div>
    
    <div class="info-panel">
        <h1>Live Earth</h1>
        <p>实时活动地球 · 2026</p>
    </div>
    
    <div class="stats" id="stats">
        FPS: -- | Rotation: 0.00°
    </div>
    
    <div class="controls">
        <button class="control-btn" onclick="toggleAutoRotate()">暂停/旋转</button>
        <button class="control-btn" onclick="resetView()">重置视角</button>
        <button class="control-btn" onclick="toggleAtmosphere()">大气层</button>
    </div>
    
    <div class="loading" id="loading">LOADING...</div>

    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
    }
    </script>
    
    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        
        // 配置
        const CONFIG = {
            earthRadius: 5,
            atmosphereRadius: 5.3,
            rotationSpeed: 0.001,
            starCount: 3000,
            markerCount: 15
        };
        
        // 全局变量
        let scene, camera, renderer, controls;
        let earth, atmosphere, stars;
        let autoRotate = true;
        let showAtmosphere = true;
        let markers = [];
        let frameCount = 0;
        let lastTime = performance.now();
        
        // 初始化
        function init() {
            // 场景
            scene = new THREE.Scene();
            
            // 相机
            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 15;
            
            // 渲染器
            renderer = new THREE.WebGLRenderer({ 
                antialias: true,
                alpha: true 
            });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.toneMapping = THREE.ACESFilmicToneMapping;
            renderer.toneMappingExposure = 1.2;
            document.getElementById('canvas-container').appendChild(renderer.domElement);
            
            // 控制器
            controls = new OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;
            controls.minDistance = 8;
            controls.maxDistance = 30;
            controls.enablePan = false;
            
            // 创建地球
            createEarth();
            
            // 创建大气层
            createAtmosphere();
            
            // 创建星空
            createStars();
            
            // 创建活动标记
            createMarkers();
            
            // 光照
            createLights();
            
            // 事件监听
            window.addEventListener('resize', onWindowResize);
            
            // 隐藏加载
            setTimeout(() => {
                document.getElementById('loading').style.display = 'none';
            }, 1000);
            
            // 开始动画
            animate();
        }
        
        // 创建地球
        function createEarth() {
            const geometry = new THREE.SphereGeometry(CONFIG.earthRadius, 64, 64);
            
            // 地球材质 - 使用程序化纹理
            const material = new THREE.MeshPhongMaterial({
                map: createEarthTexture(),
                bumpMap: createBumpTexture(),
                bumpScale: 0.05,
                specular: new THREE.Color(0x333333),
                shininess: 5
            });
            
            earth = new THREE.Mesh(geometry, material);
            scene.add(earth);
        }
        
        // 创建地球纹理（程序化）
        function createEarthTexture() {
            const canvas = document.createElement('canvas');
            canvas.width = 2048;
            canvas.height = 1024;
            const ctx = canvas.getContext('2d');
            
            // 海洋背景
            const oceanGradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
            oceanGradient.addColorStop(0, '#1a3a5c');
            oceanGradient.addColorStop(0.5, '#0d2137');
            oceanGradient.addColorStop(1, '#1a3a5c');
            ctx.fillStyle = oceanGradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // 绘制大陆轮廓（简化版）
            ctx.fillStyle = '#2d5a3d';
            
            // 北美洲
            drawContinent(ctx, 200, 200, 300, 250);
            // 南美洲
            drawContinent(ctx, 350, 450, 150, 200);
            // 欧洲
            drawContinent(ctx, 900, 180, 200, 150);
            // 非洲
            drawContinent(ctx, 920, 350, 200, 250);
            // 亚洲
            drawContinent(ctx, 1100, 150, 400, 300);
            // 澳大利亚
            drawContinent(ctx, 1400, 500, 150, 100);
            
            // 添加云层效果
            ctx.globalAlpha = 0.3;
            for (let i = 0; i < 50; i++) {
                const x = Math.random() * canvas.width;
                const y = Math.random() * canvas.height;
                const w = 50 + Math.random() * 150;
                const h = 20 + Math.random() * 40;
                ctx.fillStyle = '#ffffff';
                ctx.beginPath();
                ctx.ellipse(x, y, w, h, Math.random() * Math.PI, 0, Math.PI * 2);
                ctx.fill();
            }
            
            const texture = new THREE.CanvasTexture(canvas);
            texture.wrapS = THREE.RepeatWrapping;
            texture.wrapT = THREE.ClampToEdgeWrapping;
            return texture;
        }
        
        function drawContinent(ctx, x, y, w, h) {
            ctx.beginPath();
            const points = [];
            const segments = 12;
            for (let i = 0; i <= segments; i++) {
                const angle = (i / segments) * Math.PI * 2;
                const radiusX = w / 2 * (0.7 + Math.random() * 0.3);
                const radiusY = h / 2 * (0.7 + Math.random() * 0.3);
                points.push({
                    x: x + w/2 + Math.cos(angle) * radiusX,
                    y: y + h/2 + Math.sin(angle) * radiusY
                });
            }
            ctx.moveTo(points[0].x, points[0].y);
            for (let i = 1; i < points.length; i++) {
                ctx.lineTo(points[i].x, points[i].y);
            }
            ctx.closePath();
            ctx.fill();
        }
        
        // 创建凹凸贴图
        function createBumpTexture() {
            const canvas = document.createElement('canvas');
            canvas.width = 1024;
            canvas.height = 512;
            const ctx = canvas.getContext('2d');
            
            ctx.fillStyle = '#000000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // 简单的山脉/地形
            for (let i = 0; i < 100; i++) {
                const x = Math.random() * canvas.width;
                const y = Math.random() * canvas.height;
                const r = 10 + Math.random() * 30;
                const gradient = ctx.createRadialGradient(x, y, 0, x, y, r);
                gradient.addColorStop(0, 'rgba(255,255,255,0.3)');
                gradient.addColorStop(1, 'rgba(0,0,0,0)');
                ctx.fillStyle = gradient;
                ctx.fillRect(x - r, y - r, r * 2, r * 2);
            }
            
            return new THREE.CanvasTexture(canvas);
        }
        
        // 创建大气层
        function createAtmosphere() {
            const geometry = new THREE.SphereGeometry(CONFIG.atmosphereRadius, 64, 64);
            const material = new THREE.ShaderMaterial({
                vertexShader: `
                    varying vec3 vNormal;
                    void main() {
                        vNormal = normalize(normalMatrix * normal);
                        gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
                    }
                `,
                fragmentShader: `
                    varying vec3 vNormal;
                    void main() {
                        float intensity = pow(0.7 - dot(vNormal, vec3(0.0, 0.0, 1.0)), 2.0);
                        gl_FragColor = vec4(0.3, 0.6, 1.0, 1.0) * intensity;
                    }
                `,
                blending: THREE.AdditiveBlending,
                side: THREE.BackSide,
                transparent: true
            });
            
            atmosphere = new THREE.Mesh(geometry, material);
            scene.add(atmosphere);
        }
        
        // 创建星空
        function createStars() {
            const geometry = new THREE.BufferGeometry();
            const positions = new Float32Array(CONFIG.starCount * 3);
            const colors = new Float32Array(CONFIG.starCount * 3);
            const sizes = new Float32Array(CONFIG.starCount);
            
            for (let i = 0; i < CONFIG.starCount; i++) {
                const i3 = i * 3;
                const radius = 50 + Math.random() * 100;
                const theta = Math.random() * Math.PI * 2;
                const phi = Math.acos(2 * Math.random() - 1);
                
                positions[i3] = radius * Math.sin(phi) * Math.cos(theta);
                positions[i3 + 1] = radius * Math.sin(phi) * Math.sin(theta);
                positions[i3 + 2] = radius * Math.cos(phi);
                
                // 星星颜色变化
                const colorChoice = Math.random();
                if (colorChoice < 0.7) {
                    colors[i3] = 1; colors[i3+1] = 1; colors[i3+2] = 1;
                } else if (colorChoice < 0.85) {
                    colors[i3] = 0.8; colors[i3+1] = 0.9; colors[i3+2] = 1;
                } else {
                    colors[i3] = 1; colors[i3+1] = 0.9; colors[i3+2] = 0.7;
                }
                
                sizes[i] = Math.random() * 2;
            }
            
            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));
            geometry.setAttribute('size', new THREE.BufferAttribute(sizes, 1));
            
            const material = new THREE.PointsMaterial({
                size: 0.5,
                vertexColors: true,
                transparent: true,
                opacity: 0.8,
                sizeAttenuation: true
            });
            
            stars = new THREE.Points(geometry, material);
            scene.add(stars);
        }
        
        // 创建活动标记
        function createMarkers() {
            const markerPositions = [
                { lat: 40, lon: -74, name: '纽约' },
                { lat: 51, lon: 0, name: '伦敦' },
                { lat: 35, lon: 139, name: '东京' },
                { lat: 31, lon: 121, name: '上海' },
                { lat: -33, lon: 151, name: '悉尼' },
                { lat: 55, lon: 37, name: '莫斯科' },
                { lat: 19, lon: -99, name: '墨西哥城' },
                { lat: -23, lon: -46, name: '圣保罗' },
                { lat: 39, lon: 116, name: '北京' },
                { lat: 52, lon: 4, name: '阿姆斯特丹' },
                { lat: 48, lon: 2, name: '巴黎' },
                { lat: 34, lon: -118, name: '洛杉矶' },
                { lat: 1, lon: 103, name: '新加坡' },
                { lat: 22, lon: 114, name: '香港' },
                { lat: -34, lon: -58, name: '布宜诺斯艾利斯' }
            ];
            
            markerPositions.forEach((pos, index) => {
                const marker = createMarker(pos.lat, pos.lon, pos.name, index);
                markers.push(marker);
                scene.add(marker);
            });
        }
        
        function createMarker(lat, lon, name, index) {
            const group = new THREE.Group();
            
            // 坐标转换
            const phi = (90 - lat) * (Math.PI / 180);
            const theta = (lon + 180) * (Math.PI / 180);
            const radius = CONFIG.earthRadius + 0.1;
            
            const x = -radius * Math.sin(phi) * Math.cos(theta);
            const y = radius * Math.cos(phi);
            const z = radius * Math.sin(phi) * Math.sin(theta);
            
            group.position.set(x, y, z);
            group.lookAt(0, 0, 0);
            
            // 发光点
            const glowGeometry = new THREE.SphereGeometry(0.08, 16, 16);
            const glowMaterial = new THREE.MeshBasicMaterial({
                color: new THREE.Color().setHSL(0.5 + Math.random() * 0.2, 0.8, 0.6),
                transparent: true,
                opacity: 0.9
            });
            const glow = new THREE.Mesh(glowGeometry, glowMaterial);
            group.add(glow);
            
            // 脉冲环
            const ringGeometry = new THREE.RingGeometry(0.1, 0.15, 32);
            const ringMaterial = new THREE.MeshBasicMaterial({
                color: glowMaterial.color,
                transparent: true,
                opacity: 0.6,
                side: THREE.DoubleSide
            });
            const ring = new THREE.Mesh(ringGeometry, ringMaterial);
            ring.rotation.x = Math.PI / 2;
            group.add(ring);
            
            group.userData = { 
                name, 
                baseScale: 1, 
                phase: Math.random() * Math.PI * 2 
            };
            
            return group;
        }
        
        // 创建光照
        function createLights() {
            // 环境光
            const ambientLight = new THREE.AmbientLight(0x404040, 0.5);
            scene.add(ambientLight);
            
            // 主光源（太阳）
            const sunLight = new THREE.DirectionalLight(0xffffff, 1.5);
            sunLight.position.set(10, 5, 10);
            scene.add(sunLight);
            
            // 补光
            const fillLight = new THREE.DirectionalLight(0x4fc3f7, 0.3);
            fillLight.position.set(-10, -5, -10);
            scene.add(fillLight);
            
            // 背面光（大气层发光效果）
            const backLight = new THREE.PointLight(0x4fc3f7, 0.5, 20);
            backLight.position.set(-8, 2, -5);
            scene.add(backLight);
        }
        
        // 窗口大小改变
        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }
        
        // 动画循环
        function animate() {
            requestAnimationFrame(animate);
            
            const currentTime = performance.now();
            const delta = (currentTime - lastTime) / 1000;
            frameCount++;
            
            // 自动旋转
            if (autoRotate && earth) {
                earth.rotation.y += CONFIG.rotationSpeed;
            }
            
            // 标记动画
            markers.forEach((marker, i) => {
                const phase = marker.userData.phase;
                const scale = 1 + Math.sin(currentTime * 0.003 + phase) * 0.3;
                marker.scale.setScalar(scale);
                
                // 旋转标记
                if (marker.children[1]) {
                    marker.children[1].rotation.z += 0.02;
                }
            });
            
            // 星空缓慢旋转
            if (stars) {
                stars.rotation.y += 0.0001;
            }
            
            // FPS 计算
            if (frameCount % 30 === 0) {
                const fps = Math.round(1 / delta);
                const rotation = ((earth?.rotation.y || 0) * 180 / Math.PI % 360).toFixed(2);
                document.getElementById('stats').textContent = 
                    `FPS: ${fps} | Rotation: ${rotation}°`;
            }
            
            lastTime = currentTime;
            
            controls.update();
            renderer.render(scene, camera);
        }
        
        // 暴露全局函数
        window.toggleAutoRotate = function() {
            autoRotate = !autoRotate;
        };
        
        window.resetView = function() {
            camera.position.set(0, 0, 15);
            controls.reset();
        };
        
        window.toggleAtmosphere = function() {
            showAtmosphere = !showAtmosphere;
            if (atmosphere) {
                atmosphere.visible = showAtmosphere;
            }
        };
        
        // 启动
        init();
    </script>
</body>
</html>
